<style>

.db-edit:hover{border-color:var(--bd);background:rgba(255,255,255,.03)}

.tab:hover{color:var(--tx)}.tab.active{color:var(--bl);border-bottom-color:var(--bl)}

.main{padding:20px 24px;display:flex;flex-direction:column;gap:15px;min-width:0}

.cards{display:flex;gap:10px;flex-wrap:wrap}
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;padding:10px 14px;flex:1;min-width:140px}
.cl{font-size:10px;text-transform:uppercase;letter-spacing:.7px;color:var(--mu);margin-bottom:3px}
.cv{font-size:12px;font-weight:700;font-family:monospace;color:var(--tx)}.cv.b{color:var(--bl)}.cv.o{color:var(--or)}.cv.g{color:var(--gr)}.cv.p{color:var(--pu)}

.tg-nn{background:rgba(255,123,114,.12);color:var(--pk)}.tg-nl{background:rgba(86,211,100,.12);color:var(--gr)}

.c-tip{background:rgba(31,111,235,.1);border:1px solid rgba(31,111,235,.3);color:var(--bl)}

.c-pur{background:rgba(210,168,255,.1);border:1px solid rgba(210,168,255,.3);color:var(--pu)}
.ci{font-size:14px;flex-shrink:0;margin-top:1px}
.code-box{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;overflow:hidden}

.cd-lbl{font-size:11px;color:var(--mu);margin-left:8px}
.cpbtn{background:rgba(255,255,255,.07);border:1px solid var(--bd);color:var(--mu);padding:4px 12px;border-radius:6px;font-size:11px;cursor:pointer;font-family:inherit;transition:all .2s}
.cpbtn:hover{background:rgba(255,255,255,.12);color:var(--tx)}.cpbtn.ok{background:rgba(86,211,100,.15);border-color:var(--gr);color:var(--gr)}
.code-scroll{display:flex;overflow-x:auto}
.ln-gutter{flex-shrink:0;padding:15px 0;text-align:right;background:rgba(0,0,0,.18);border-right:1px solid var(--bd);user-select:none;font-family:'Cascadia Code','Consolas',monospace;font-size:12.5px;line-height:1.75;color:#4a5160;min-width:42px}
.ln-gutter span{display:block;padding:0 10px}
pre{flex:1;padding:15px 18px;font-family:'Cascadia Code','Fira Code','Consolas',monospace;font-size:12.5px;line-height:1.75;white-space:pre;min-width:0}
.code-scroll::-webkit-scrollbar{height:10px}
.code-scroll::-webkit-scrollbar-thumb{background:#3a4150;border-radius:5px;border:2px solid var(--bg2)}
.code-scroll::-webkit-scrollbar-thumb:hover{background:#4a5160}
.code-scroll::-webkit-scrollbar-corner{background:var(--bg2)}
.kw{color:#FF7B72;font-weight:700}.ty{color:#79C0FF}.cm{color:#5c6370;font-style:italic}.st{color:#98c379}.nb{color:#d19a66}
.res-wrap{background:var(--bg2);border:1px solid var(--bd);border-radius:8px;overflow:hidden}
.res-hdr{padding:8px 14px;border-bottom:1px solid var(--bd);font-size:11px;color:var(--gr);display:flex;align-items:center;gap:6px}
table.rt{width:100%;border-collapse:collapse;font-size:12px}
.rt th{text-align:left;padding:6px 12px;background:rgba(255,255,255,.04);color:var(--mu);font-size:10px;text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--bd);font-weight:700}
.rt td{padding:6px 12px;border-bottom:1px solid rgba(255,255,255,.035);font-family:monospace;color:var(--tx)}.rt tr:last-child td{border-bottom:none}
.res-note{padding:7px 14px;font-size:11px;color:var(--mu);border-top:1px solid var(--bd)}
.nav-row{display:flex;gap:10px;justify-content:flex-end;padding-top:12px;border-top:1px solid var(--bd)}
.btn{padding:8px 20px;border-radius:6px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:all .2s}
.btn-p{background:transparent;border:1px solid var(--bd);color:var(--mu)}.btn-p:hover:not(:disabled){border-color:var(--mu);color:var(--tx)}
.btn-n{background:var(--ac);color:#fff}.btn-n:hover:not(:disabled){background:var(--ac2)}

<script>
const CHS=[
// ══════════════════════════════════════════════════
// CHAPTER 0: DDL
// ══════════════════════════════════════════════════
{id:0,label:'DDL (โครงสร้าง)',steps:[
{icon:'🗄️',title:'สร้างฐานข้อมูล',sub:'CREATE DATABASE · USE · เลือกฐานข้อมูล',
 cards:[{l:'ชื่อ DB',v:'{{DB}}',c:'b'},{l:'คำสั่ง',v:'CREATE DATABASE',c:'b'},{l:'เลือกใช้',v:'USE',c:'o'}],
 notes:[
   {t:'tip',i:'💡',x:'CREATE DATABASE เหมือนซื้อตู้เก็บแฟ้มใหม่  USE คือการเดินไปเปิดตู้ใบนั้นก่อนทำงาน'},
   {t:'warn',i:'⚠️',x:'ต้องพิมพ์ USE ทุกครั้งที่เปิด Query Editor ใหม่  มิฉะนั้นคำสั่งจะทำงานกับ DB ผิดตัว!'}
 ],
 code:`-- STEP 0: สร้างฐานข้อมูล
CREATE DATABASE {{DB}};
GO

-- เลือกใช้ฐานข้อมูลนี้
USE {{DB}};
GO`},

{icon:'🗑️',title:'DROP TABLE (Safety Reset)',sub:'ลบตารางเดิมถ้ามี · ลำดับ Child → Parent',
 cards:[{l:'คำสั่ง',v:'IF OBJECT_ID + DROP',c:'b'},{l:'ลำดับ',v:'Child ก่อน Parent',c:'o'},{l:'ผล',v:'Reset ปลอดภัย',c:'g'}],
 notes:[
   {t:'warn',i:'⚠️',x:'ต้องลบ Child table ก่อน Parent เสมอ  เพราะ Child มี FK อ้างอิงไป Parent  ถ้าลบ Parent ก่อนจะ Error'},
   {t:'tip',i:'💡',x:'IF OBJECT_ID(\'...\',\'U\') IS NOT NULL ตรวจว่ามีตารางอยู่ก่อน  ถ้าไม่มีก็ข้ามไป ไม่ Error'}
 ],
 code:`USE {{DB}};
GO

-- DROP ตารางเดิม เรียงลำดับ Child → Parent
IF OBJECT_ID('invoice_inventory', 'U') IS NOT NULL  DROP TABLE invoice_inventory;
IF OBJECT_ID('product_inventory', 'U') IS NOT NULL  DROP TABLE product_inventory;
IF OBJECT_ID('order_product',     'U') IS NOT NULL  DROP TABLE order_product;
IF OBJECT_ID('product',           'U') IS NOT NULL  DROP TABLE product;
IF OBJECT_ID('type_color',        'U') IS NOT NULL  DROP TABLE type_color;
IF OBJECT_ID('invoice',           'U') IS NOT NULL  DROP TABLE invoice;
IF OBJECT_ID('inventory_item',    'U') IS NOT NULL  DROP TABLE inventory_item;
IF OBJECT_ID('ordered',           'U') IS NOT NULL  DROP TABLE ordered;
GO`},

{icon:'📋',title:'CREATE TABLE — Parent (ไม่มี FK)',sub:'4 ตารางแรก · type_color · ordered · inventory_item · invoice',
 cols:[
   {tbl:'type_color',rows:[{n:'product_type',dt:'char(20)',nl:'NOT NULL',k:'PK'},{n:'product_color',dt:'char(20)',nl:'NOT NULL',k:''}]},
   {tbl:'ordered',rows:[{n:'order_no',dt:'char(4)',nl:'NOT NULL',k:'PK'},{n:'order_date',dt:'datetime',nl:'NOT NULL',k:''},{n:'customer_name',dt:'char(30)',nl:'NOT NULL',k:''},{n:'ship_date',dt:'datetime',nl:'NOT NULL',k:''},{n:'ship_address',dt:'char(20)',nl:'NOT NULL',k:''},{n:'ship_district',dt:'char(20)',nl:'NULL',k:''},{n:'ship_province',dt:'char(20)',nl:'NOT NULL',k:''},{n:'customer_phone',dt:'char(12)',nl:'NULL',k:''}]},
   {tbl:'inventory_item',rows:[{n:'item_no',dt:'char(4)',nl:'NOT NULL',k:'PK'},{n:'item_des',dt:'char(30)',nl:'NULL',k:''},{n:'quantity_in_stock',dt:'int',nl:'NOT NULL',k:''},{n:'min_order_quantity',dt:'int',nl:'NOT NULL',k:''}]},
   {tbl:'invoice',rows:[{n:'vendor_no',dt:'char(4)',nl:'NOT NULL',k:'PK'},{n:'invoice_no',dt:'char(4)',nl:'NOT NULL',k:'PK'},{n:'invoice_date',dt:'datetime',nl:'NOT NULL',k:''}]}
 ],
 notes:[{t:'tip',i:'💡',x:'ตาราง Parent ไม่มี FK จึงสร้างได้โดยไม่ต้องพึ่งตารางอื่น  สร้างก่อน Child เสมอ!'}],
 code:`USE {{DB}};
GO

-- ตาราง 1: TYPE_COLOR (ไม่มี FK — สร้างก่อน)
-- เกิดจาก 3NF: PRODUCT_TYPE → PRODUCT_COLOR จึงแยกออกมา
CREATE TABLE type_color (
    product_type  char(20) NOT NULL,
    product_color char(20) NOT NULL,
    CONSTRAINT pk_type_color PRIMARY KEY (product_type)
);

-- ตาราง 2: ORDERED (ไม่มี FK)
CREATE TABLE ordered (
    order_no        char(4)   NOT NULL,
    order_date      datetime  NOT NULL,
    customer_name   char(30)  NOT NULL,
    ship_date       datetime  NOT NULL,
    ship_address    char(20)  NOT NULL,
    ship_district   char(20)  NULL,
    ship_province   char(20)  NOT NULL,
    customer_phone  char(12)  NULL,
    CONSTRAINT pk_ordered PRIMARY KEY (order_no)
);

-- ตาราง 3: INVENTORY_ITEM (ไม่มี FK)
CREATE TABLE inventory_item (
    item_no              char(4)  NOT NULL,
    item_des             char(30) NULL,
    quantity_in_stock    int      NOT NULL,
    min_order_quantity   int      NOT NULL,
    CONSTRAINT pk_inventory_item PRIMARY KEY (item_no)
);

-- ตาราง 4: INVOICE (Composite PK — ไม่มี FK)
CREATE TABLE invoice (
    vendor_no     char(4)   NOT NULL,
    invoice_no    char(4)   NOT NULL,
    invoice_date  datetime  NOT NULL,
    CONSTRAINT pk_invoice PRIMARY KEY (vendor_no, invoice_no)
);
GO`},

{icon:'🔗',title:'CREATE TABLE — Child (มี FK)',sub:'4 ตารางสุดท้าย · product · order_product · product_inventory · invoice_inventory',
 cols:[
   {tbl:'product',rows:[{n:'product_no',dt:'char(4)',nl:'NOT NULL',k:'PK'},{n:'product_des',dt:'char(30)',nl:'NOT NULL',k:''},{n:'product_type',dt:'char(20)',nl:'NOT NULL',k:'FK'}]},
   {tbl:'order_product',rows:[{n:'order_no',dt:'char(4)',nl:'NOT NULL',k:'PK+FK'},{n:'product_no',dt:'char(4)',nl:'NOT NULL',k:'PK+FK'},{n:'quantity_ordered',dt:'int',nl:'NOT NULL',k:''}]},
   {tbl:'product_inventory',rows:[{n:'product_no',dt:'char(4)',nl:'NOT NULL',k:'PK+FK'},{n:'item_no',dt:'char(4)',nl:'NOT NULL',k:'PK+FK'},{n:'quantity_used',dt:'int',nl:'NOT NULL',k:''}]},
   {tbl:'invoice_inventory',rows:[{n:'vendor_no',dt:'char(4)',nl:'NOT NULL',k:'PK+FK'},{n:'invoice_no',dt:'char(4)',nl:'NOT NULL',k:'PK+FK'},{n:'item_no',dt:'char(4)',nl:'NOT NULL',k:'PK+FK'},{n:'quantity_added',dt:'int',nl:'NOT NULL',k:''},{n:'item_paid',dt:'decimal',nl:'NOT NULL',k:''}]}
 ],
 notes:[{t:'warn',i:'⚠️',x:'ต้องสร้าง Parent 4 ตารางก่อนแล้ว  ถ้า REFERENCES ไปตารางที่ยังไม่มี จะ Error ทันที'}],
 code:`USE {{DB}};
GO

-- ตาราง 5: PRODUCT (FK → type_color)
CREATE TABLE product (
    product_no    char(4)   NOT NULL,
    product_des   char(30)  NOT NULL,
    product_type  char(20)  NOT NULL,
    CONSTRAINT pk_product    PRIMARY KEY (product_no),
    CONSTRAINT fk_product_tc FOREIGN KEY (product_type)
        REFERENCES type_color(product_type)
);

-- ตาราง 6: ORDER_PRODUCT (Bridge M:N — FK → ordered, product)
CREATE TABLE order_product (
    order_no          char(4)  NOT NULL,
    product_no        char(4)  NOT NULL,
    quantity_ordered  int      NOT NULL,
    CONSTRAINT pk_order_product PRIMARY KEY (order_no, product_no),
    CONSTRAINT fk_op_ordered    FOREIGN KEY (order_no)
        REFERENCES ordered(order_no),
    CONSTRAINT fk_op_product    FOREIGN KEY (product_no)
        REFERENCES product(product_no)
);

-- ตาราง 7: PRODUCT_INVENTORY (Bridge M:N — FK → product, inventory_item)
CREATE TABLE product_inventory (
    product_no    char(4)  NOT NULL,
    item_no       char(4)  NOT NULL,
    quantity_used int      NOT NULL,
    CONSTRAINT pk_product_inventory PRIMARY KEY (product_no, item_no),
    CONSTRAINT fk_pi_product        FOREIGN KEY (product_no)
        REFERENCES product(product_no),
    CONSTRAINT fk_pi_item           FOREIGN KEY (item_no)
        REFERENCES inventory_item(item_no)
);

-- ตาราง 8: INVOICE_INVENTORY (สร้างสุดท้าย — FK → invoice composite + inventory_item)
CREATE TABLE invoice_inventory (
    vendor_no      char(4)   NOT NULL,
    invoice_no     char(4)   NOT NULL,
    item_no        char(4)   NOT NULL,
    quantity_added int       NOT NULL,
    item_paid      decimal   NOT NULL,
    CONSTRAINT pk_invoice_inventory PRIMARY KEY (vendor_no, invoice_no, item_no),
    CONSTRAINT fk_ii_invoice        FOREIGN KEY (vendor_no, invoice_no)
        REFERENCES invoice(vendor_no, invoice_no),
    CONSTRAINT fk_ii_item           FOREIGN KEY (item_no)
        REFERENCES inventory_item(item_no)
);
GO

PRINT '=== สร้างตารางทั้ง 8 ตารางเรียบร้อย ===';
GO`},

{icon:'✏️',title:'ALTER TABLE',sub:'เพิ่มคอลัมน์ · เปลี่ยน Data Type · กิจกรรมที่ 4 ข้อ 2',
 cards:[{l:'ADD column',v:'item_place',c:'b'},{l:'ALTER COLUMN',v:'customer_phone',c:'o'},{l:'รวม',v:'3 คำสั่ง',c:'g'}],
 notes:[
   {t:'tip',i:'💡',x:'ALTER TABLE ADD เพิ่มคอลัมน์ใหม่  ALTER TABLE ALTER COLUMN เปลี่ยนชนิดข้อมูลของคอลัมน์ที่มีอยู่'},
   {t:'warn',i:'⚠️',x:'SQL Server: ถ้าคอลัมน์มีข้อมูลอยู่แล้ว การเปลี่ยนชนิดข้อมูลอาจ Error ถ้าข้อมูลเก่าแปลงไม่ได้'}
 ],
 code:`USE {{DB}};
GO

-- 3.1 เพิ่มคอลัมน์ item_place ในตาราง inventory_item
ALTER TABLE inventory_item
ADD item_place char(25) NULL;

-- 3.2 เปลี่ยน customer_phone จาก char(12) → int
ALTER TABLE ordered
ALTER COLUMN customer_phone int NULL;

-- 3.3 เปลี่ยนกลับเป็น char(12) เพื่อเก็บข้อมูลจริง
ALTER TABLE ordered
ALTER COLUMN customer_phone char(12) NULL;
GO

PRINT '=== ALTER TABLE เรียบร้อย ===';
GO`}

// ── Syntax Highlighter ──
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function findCI(l){let ins=false;for(let i=0;i<l.length-1;i++){if(l[i]==="'")ins=!ins;if(!ins&&l[i]==='-'&&l[i+1]==='-')return i;}return -1}
const KWS='CREATE|DATABASE|TABLE|GO|USE|SELECT|FROM|WHERE|ORDER|BY|NOT|NULL|PRIMARY|KEY|FOREIGN|REFERENCES|INSERT|INTO|VALUES|AND|OR|DISTINCT|UPDATE|SET|DELETE|ALTER|ADD|COUNT|AS|GROUP|OBJECT_ID|DROP|IF|IS|BETWEEN|LIKE|CONSTRAINT|ON|JOIN|PRINT|HAVING|ASC|DESC|INNER';
const TYS='char|int|datetime|decimal|varchar|nvarchar';
function procCode(s){
  const pts=[];let i=0;
  while(i<s.length){
    if(s[i]==="'"){let j=i+1;while(j<s.length&&s[j]!=="'")j++;pts.push({str:true,t:s.slice(i,j+1)});i=j+1;}
    else{let j=i;while(j<s.length&&s[j]!=="'")j++;pts.push({str:false,t:s.slice(i,j)});i=j;}
  }
  return pts.map(p=>{
    if(p.str)return`<span class="st">${esc(p.t)}</span>`;
    let r=esc(p.t);
    r=r.replace(new RegExp(`\\b(${KWS})\\b`,'gi'),'<span class="kw">$1</span>');
    r=r.replace(new RegExp(`\\b(${TYS})\\b`,'gi'),'<span class="ty">$1</span>');
    r=r.replace(/\b(\d+)\b/g,'<span class="nb">$1</span>');
    return r;
  }).join('');
}
function hlSQL(code){
  return code.split('\n').map(l=>{
    if(l.trim().startsWith('--'))return`<span class="cm">${esc(l)}</span>`;
    const ci=findCI(l);
    return procCode(ci>=0?l.slice(0,ci):l)+(ci>=0?`<span class="cm">${esc(l.slice(ci))}</span>`:'');
  }).join('\n');
}

// ── State ──
let curCh=0,curSt=0;
const done={0:new Set(),1:new Set(),2:new Set()};

// ── Helpers ──
function tagH(k){
  if(!k)return'';
  return k.split('+').map(t=>{t=t.trim();
    if(t==='PK'||t.startsWith('PK'))return`<span class="tg tg-pk">PK</span>`;
    if(t==='FK'||t.startsWith('FK'))return`<span class="tg tg-fk">FK</span>`;
    return`<span class="tg tg-pk">${t}</span>`;
  }).join(' ');
}
function nlT(nl){return nl==='NULL'?'<span class="tg tg-nl">NULL</span>':'<span class="tg tg-nn">NOT NULL</span>'}
function ctC(t){return{tip:'c-tip',warn:'c-warn',ok:'c-ok',pur:'c-pur'}[t]||'c-tip'}

// ── Render ──
function renderSB(){
  const ch=CHS[curCh];
  document.getElementById('sb').innerHTML=`<div class="sb-sec">${ch.label}</div>`+
  ch.steps.map((s,i)=>`<div class="sb-item ${i===curSt?'active':''} ${done[curCh].has(i)&&i!==curSt?'done':''}" onclick="goSt(${i})">
    <div class="sb-num">${done[curCh].has(i)&&i!==curSt?'✓':i+1}</div>
    <div class="sb-lbl">${s.icon} ${s.title}</div>
  </div>`).join('');
}
function renderProg(){
  const s=CHS[curCh].steps.length;
  const p=s>1?Math.round((done[curCh].size/s)*100):curSt===s-1?100:0;
  document.getElementById('pf').style.width=p+'%';
}
function colsTbl(cols){
  if(!cols||!cols.length)return'';
  return cols.map(g=>`<div class="tbl-wrap"><div class="tbl-hdr">📋 <strong>${g.tbl}</strong></div>
  <table class="ct"><tr><th>Column</th><th>Data Type</th><th>Nullable</th><th>Key</th></tr>
  ${g.rows.map(r=>`<tr><td>${r.n}</td><td>${r.dt}</td><td>${nlT(r.nl)}</td><td>${tagH(r.k)}</td></tr>`).join('')}
  </table></div>`).join('');
}
function resTbl(res){
  if(!res)return'';
  return`<div class="res-wrap"><div class="res-hdr">▶ ${res.hdr}</div>
  <table class="rt"><tr>${res.cols.map(c=>`<th>${c}</th>`).join('')}</tr>
  ${res.rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}
  </table>${res.note?`<div class="res-note">ℹ️ ${res.note}</div>`:''}</div>`;
}
function getDB(){const el=document.getElementById('dbName');const v=el?el.value.trim():'';return v||'ABC_Inventory'}
function applyDB(code){return code.replace(/\{\{DB\}\}/g,getDB())}
function lineNumbers(code){const n=code.split('\n').length;let g='';for(let i=1;i<=n;i++)g+=`<span>${i}</span>`;return g}
function renderMain(){
  const s=CHS[curCh].steps[curSt];
  const tot=CHS[curCh].steps.length;
  const db=getDB();
  const codeRaw=applyDB(s.code);
  const cards=s.cards?`<div class="cards">${s.cards.map(c=>`<div class="card"><div class="cl">${c.l}</div><div class="cv ${c.c||''}">${applyDB(c.v)}</div></div>`).join('')}</div>`:'';
  const notes=s.notes?s.notes.map(n=>`<div class="call ${ctC(n.t)}"><span class="ci">${n.i}</span><span>${n.x}</span></div>`).join(''):'';
  document.getElementById('mn').innerHTML=`
    <div class="step-hdr"><div class="step-icon">${s.icon}</div>
      <div><div class="step-title">${CHS[curCh].label} — ขั้นที่ ${curSt+1}/${tot}: ${s.title}</div>
      <div class="step-sub">${s.sub}</div></div></div>
    ${cards}
    ${colsTbl(s.cols)}
    ${notes}
    <div class="code-box">
      <div class="code-hdr">
        <div style="display:flex;align-items:center">
          <div class="cd-dots"><div class="cd" style="background:#FF5F57"></div><div class="cd" style="background:#FEBC2E"></div><div class="cd" style="background:#28C840"></div></div>
          <span class="cd-lbl">T-SQL · ${esc(db)}</span>
        </div>
        <button class="cpbtn" id="cpb" onclick="doCopy()">📋 คัดลอกโค้ด</button>
      </div>
      <div class="code-scroll">
        <div class="ln-gutter">${lineNumbers(codeRaw)}</div>
        <pre>${hlSQL(codeRaw)}</pre>
      </div>
    </div>
    ${resTbl(s.result)}
    <div class="nav-row">
      <button class="btn btn-p" onclick="goSt(${curSt-1})" ${curSt===0?'disabled':''}>← ก่อนหน้า</button>
      <button class="btn btn-n" onclick="doNext()" ${curSt===tot-1?'disabled':''}>
        ${curSt===tot-1?'เสร็จสิ้น ✓':'ถัดไป →'}
      </button>
    </div>`;
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── Actions ──
function switchCh(id){
  curCh=id;curSt=0;
  [0,1,2].forEach(i=>document.getElementById('t'+i).className='tab'+(i===id?' active':''));
  renderSB();renderProg();renderMain();
}
function goSt(i){
  if(i<0||i>=CHS[curCh].steps.length)return;
  done[curCh].add(curSt);curSt=i;
  renderSB();renderProg();renderMain();
}
function doNext(){if(curSt<CHS[curCh].steps.length-1)goSt(curSt+1)}
function doCopy(){
  const code=applyDB(CHS[curCh].steps[curSt].code);
  const b=document.getElementById('cpb');
  const ok=()=>{b.textContent='✓ คัดลอกแล้ว!';b.className='cpbtn ok';setTimeout(()=>{b.textContent='📋 คัดลอกโค้ด';b.className='cpbtn'},2200)};
  navigator.clipboard?navigator.clipboard.writeText(code).then(ok).catch(()=>fb(code,ok)):fb(code,ok);
}
function fb(c,cb){const t=document.createElement('textarea');t.value=c;document.body.appendChild(t);t.select();try{document.execCommand('copy');cb()}catch(e){}document.body.removeChild(t)}

// Init
const dbInput=document.getElementById('dbName');
if(dbInput){
  dbInput.addEventListener('input',()=>{
    // อนุญาตเฉพาะ a-z A-Z 0-9 _ (กฎการตั้งชื่อฐานข้อมูล SQL Server)
    dbInput.value=dbInput.value.replace(/[^A-Za-z0-9_]/g,'');
    renderMain();
  });
}
renderSB();renderProg();renderMain();
</script>
</body>
</html>
