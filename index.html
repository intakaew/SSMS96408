<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ห้องสมุดออนไลน์ · อ่านหนังสือ</title>
<meta name="description" content="ห้องสมุดออนไลน์ รวมหนังสือและคู่มือเรียน อ่านได้ทุกที่ทุกเวลา">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
<link rel="stylesheet" href="assets/library.css">
</head>
<body>

<header class="hero">
  <div class="hero-in">
    <h1><span class="ic">📖</span> ห้องสมุดออนไลน์</h1>
    <p>รวมหนังสือและคู่มือเรียน — เลือกเล่มแล้วคลิกเพื่ออ่านได้ทันที</p>
    <div class="stat">
      <span><b id="statBooks">0</b> เล่ม</span>
      <span>อ่านได้ทุกอุปกรณ์ 📱💻</span>
      <span>อัปเดต <b id="statDate">—</b></span>
    </div>
  </div>
</header>

<div class="toolbar">
  <div class="search">
    <span class="mag">🔍</span>
    <input id="q" type="search" placeholder="ค้นหาชื่อหนังสือ รหัสวิชา หรือหมวดหมู่…" autocomplete="off" spellcheck="false">
  </div>
  <div class="count" id="count"></div>
</div>

<main class="grid" id="grid"></main>

<footer class="pagefoot">
  สร้างด้วย ❤️ เป็นเว็บอ่านหนังสือออนไลน์ · โฮสต์บน
  <a href="https://pages.github.com/" target="_blank" rel="noopener">GitHub Pages</a>
</footer>

<script src="assets/catalog.js"></script>
<script>
const grid = document.getElementById('grid');
const qEl  = document.getElementById('q');
const countEl = document.getElementById('count');

function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}

function cardHTML(b){
  const tags = (b.tags||[]).map(t=>`<span>${esc(t)}</span>`).join('');
  return `<a class="book" href="${esc(b.file)}" data-search="${esc(((b.title||'')+' '+(b.subtitle||'')+' '+(b.code||'')+' '+(b.author||'')+' '+(b.tags||[]).join(' ')).toLowerCase())}">
    <div class="cover" style="background:${esc(b.gradient||'linear-gradient(135deg,#1F6FEB,#388BFD)')}">
      <span class="emoji">${b.emoji||'📘'}</span>
      ${b.code?`<span class="code">${esc(b.code)}</span>`:''}
    </div>
    <div class="body">
      <h3>${esc(b.title||'ไม่มีชื่อ')}</h3>
      <div class="sub">${esc(b.subtitle||'')}</div>
      ${b.author?`<div class="author">${esc(b.author)}</div>`:''}
      ${tags?`<div class="tags">${tags}</div>`:''}
      <div class="foot">
        <span class="upd">${b.updated?'อัปเดต '+esc(b.updated):''}</span>
        <span class="read">เปิดอ่าน →</span>
      </div>
    </div>
  </a>`;
}

function render(list){
  if(!list.length){
    grid.innerHTML = `<div class="empty">🔎 ไม่พบหนังสือที่ตรงกับคำค้น</div>`;
  } else {
    grid.innerHTML = list.map(cardHTML).join('');
  }
  countEl.textContent = `แสดง ${list.length} จาก ${BOOKS.length} เล่ม`;
}

function applyFilter(){
  const q = qEl.value.trim().toLowerCase();
  if(!q){ render(BOOKS); return; }
  const terms = q.split(/\s+/);
  render(BOOKS.filter(b=>{
    const hay = ((b.title||'')+' '+(b.subtitle||'')+' '+(b.code||'')+' '+(b.author||'')+' '+(b.tags||[]).join(' ')).toLowerCase();
    return terms.every(t=>hay.includes(t));
  }));
}

// init
document.getElementById('statBooks').textContent = BOOKS.length;
document.getElementById('statDate').textContent =
  BOOKS.map(b=>b.updated).filter(Boolean).sort().pop() || '—';
qEl.addEventListener('input', applyFilter);
render(BOOKS);
</script>
</body>
</html>
